name: Run Integration Tests

on: [push, pull_request]

jobs:
  llama3-on-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: SWEAgent-py311
            python-version: "3.11"
            agent: "SWEAgent"
          - name: PlannerAgent-py311
            python-version: "3.11"
            agent: "PlannerAgent"
          - name: MonologueAgent-py311
            python-version: "3.11"
            agent: "MonologueAgent"
          - name: CodeActAgent-py311
            python-version: "3.11"
            agent: "CodeActAgent"
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v2
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Poetry
        run: curl -sSL https://install.python-poetry.org | python3 -
      - name: Install Ollama and Llama3
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          sleep 30
          ollama pull llama3
      - name: Build Environment
        run: make build
      - name: Run Integration Tests
        env:
          LLM_API_KEY: "ollama"
          LLM_MODEL: "ollama/llama3"
          LLM_EMBEDDING_MODEL: "local"
          LLM_BASE_URL: "http://localhost:11434"
          AGENT: ${{ matrix.agent }}
          MAX_ITERATIONS: 10
        run: WORKSPACE_BASE=$GITHUB_WORKSPACE WORKSPACE_MOUNT_PATH=$GITHUB_WORKSPACE poetry run pytest -s ./tests/integration
